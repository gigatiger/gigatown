
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title></title>
    <script src="/js/masonry.pkgd.min.js"></script>
    <script src="/js/imagesloaded.pkgd.min.js"></script>

   
<script> document.addEventListener("DOMContentLoaded", function () { let grid = document.querySelector(".grid"); imagesLoaded(grid, function () { new Masonry(grid, { itemSelector: ".grid-item", columnWidth: 80 }); }); }); </script>

  </head>


  <body>
<div class="grid">
  <div class="grid-item"><img src="/img/dzred.png"></div>
  <div class="grid-item grid-item--width2"><img src="/img/pupref.jpeg"></div>
  <div class="grid-item grid-item--height2"></div>
 
</div>

    
  </body>

  
</html>
